name: Deploy web to Cloud Run

on:
  push:
    branches:
      - main
    paths:
      - "web/**"
  workflow_dispatch:

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker europe-west2-docker.pkg.dev --quiet

      - name: Build and push image
        env:
          GCP_REGION: ${{ secrets.GCP_REGION || 'europe-west2' }}
          IMAGE: europe-west2-docker.pkg.dev/the-tinkering-shed/infosec-news/web:${{ github.sha }}
        run: |
          docker build -t $IMAGE web/
          docker push $IMAGE

      - name: Deploy to Cloud Run
        env:
          GCP_REGION: ${{ secrets.GCP_REGION || 'europe-west2' }}
          IMAGE: europe-west2-docker.pkg.dev/the-tinkering-shed/infosec-news/web:${{ github.sha }}
        run: |
          gcloud run deploy infosec-news-web \
            --image=$IMAGE \
            --region=$GCP_REGION \
            --platform=managed \
            --allow-unauthenticated \
            --set-env-vars="GCS_BUCKET_NAME=${{ secrets.GCS_BUCKET_NAME }}" \
            --service-account=${{ secrets.WEB_SERVICE_ACCOUNT }}
