name: Deploy to Vertex AI Agent Engine

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy agent
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write runtime env file
        env:
          GCP_REGION: ${{ secrets.GCP_REGION || 'europe-west2' }}
          GCS_BUCKET_NAME: ${{ secrets.GCS_BUCKET_NAME }}
          MODEL_ARMOR_TEMPLATE_ID: ${{ secrets.MODEL_ARMOR_TEMPLATE_ID }}
          GOOGLE_CLOUD_AGENT_ENGINE_ENABLE_TELEMETRY: ${{ secrets.GOOGLE_CLOUD_AGENT_ENGINE_ENABLE_TELEMETRY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          cat > infosec_agent/.env << EOF
          GOOGLE_CLOUD_PROJECT=the-tinkering-shed
          GOOGLE_CLOUD_LOCATION=$GCP_REGION
          GCS_BUCKET_NAME=$GCS_BUCKET_NAME
          MODEL_ARMOR_TEMPLATE_ID=$MODEL_ARMOR_TEMPLATE_ID
          GOOGLE_CLOUD_AGENT_ENGINE_ENABLE_TELEMETRY=$GOOGLE_CLOUD_AGENT_ENGINE_ENABLE_TELEMETRY
          GOOGLE_API_KEY=$GOOGLE_API_KEY
          GOOGLE_GENAI_USE_VERTEXAI=0
          EOF

      - name: Deploy to Agent Engine
        env:
          AGENT_ENGINE_ID: ${{ secrets.AGENT_ENGINE_ID }}
          GCP_REGION: ${{ secrets.GCP_REGION || 'europe-west2' }}
        run: |
          if [ -n "$AGENT_ENGINE_ID" ]; then
            adk deploy agent_engine \
              --project=the-tinkering-shed \
              --region=$GCP_REGION \
              --agent_engine_id=$AGENT_ENGINE_ID \
              infosec_agent
          else
            adk deploy agent_engine \
              --project=the-tinkering-shed \
              --region=$GCP_REGION \
              infosec_agent
          fi
