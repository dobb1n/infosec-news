name: Deploy to Vertex AI Agent Engine

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy agent
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Deploy to Agent Engine
        env:
          GOOGLE_CLOUD_LOCATION: ${{ secrets.GCP_REGION || 'europe-west2' }}
          GCS_BUCKET_NAME: ${{ secrets.GCS_BUCKET_NAME }}
          AGENT_ENGINE_ID: ${{ secrets.AGENT_ENGINE_ID }}
          MODEL_ARMOR_TEMPLATE_ID: ${{ secrets.MODEL_ARMOR_TEMPLATE_ID }}
          GOOGLE_CLOUD_AGENT_ENGINE_ENABLE_TELEMETRY: ${{ secrets.GOOGLE_CLOUD_AGENT_ENGINE_ENABLE_TELEMETRY }}
        run: |
          if [ -n "$AGENT_ENGINE_ID" ]; then
            adk deploy agent_engine \
              --project=the-tinkering-shed \
              --region=$GOOGLE_CLOUD_LOCATION \
              --staging_bucket=gs://$GCS_BUCKET_NAME \
              --agent_engine_id=$AGENT_ENGINE_ID \
              infosec_agent
          else
            adk deploy agent_engine \
              --project=the-tinkering-shed \
              --region=$GOOGLE_CLOUD_LOCATION \
              --staging_bucket=gs://$GCS_BUCKET_NAME \
              infosec_agent
          fi
